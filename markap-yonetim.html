<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Markap — idarəetmə</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <h1><a class="site-logo" href="index.html">Markap</a> — idarəetmə</h1>
        <a class="ghost-btn" href="index.html">Sayta qayıt</a>
      </div>
    </header>

    <main class="wrap admin-page">
      <p class="hint">
        Bu səhifə oxucular üçün deyil. Xəbərlər Firebase Firestore-da saxlanılır və bütün cihazlarda
        dinamik yenilənir.
      </p>

      <section class="auth-box">
        <h4>Admin giriş</h4>
        <div class="auth-row">
          <input id="email" type="email" placeholder="admin@mail.com" />
          <input id="password" type="password" placeholder="şifrə" />
          <button id="loginBtn" type="button" class="primary-btn">Daxil ol</button>
          <button id="logoutBtn" type="button" class="ghost-btn">Çıxış</button>
        </div>
        <p id="authStatus" class="hint">Daxil olmamısınız.</p>
      </section>

      <form id="newsForm" class="news-form">
        <input type="hidden" id="newsId" />
        <label>
          Başlıq
          <input id="title" required />
        </label>
        <label>
          Kateqoriya
          <input id="category" required placeholder="Siyasət, Hadisə..." />
        </label>
        <label>
          Şəkil linki
          <input
            id="image"
            required
            placeholder="https://images.unsplash.com/..."
          />
        </label>
        <label>
          Qısa təsvir
          <textarea id="excerpt" rows="2" required></textarea>
        </label>
        <label>
          Ətraflı mətn
          <textarea id="content" rows="6" required></textarea>
        </label>
        <button type="submit" class="primary-btn">Yadda saxla</button>
      </form>

      <h4>Mövcud xəbərlər</h4>
      <div id="adminNewsList" class="admin-news-list"></div>
    </main>

    <script type="module" src="admin.js"></script>
  </body>
</html>
