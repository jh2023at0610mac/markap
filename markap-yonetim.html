<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Markap — idarəetmə</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <h1>Markap — idarəetmə</h1>
        <a class="ghost-btn" href="index.html">Sayta qayıt</a>
      </div>
    </header>

    <main class="wrap admin-page">
      <p class="hint">
        Bu səhifə oxucular üçün deyil. Xəbərləri əlavə edin, redaktə edin və ya silin. Dəyişikliklər
        eyni brauzerdə saxlanılır (localStorage).
      </p>

      <form id="newsForm" class="news-form">
        <input type="hidden" id="newsId" />
        <label>
          Başlıq
          <input id="title" required />
        </label>
        <label>
          Kateqoriya
          <input id="category" required placeholder="Siyasət, Hadisə..." />
        </label>
        <label>
          Şəkil linki
          <input
            id="image"
            required
            placeholder="https://images.unsplash.com/..."
          />
        </label>
        <label>
          Qısa təsvir
          <textarea id="excerpt" rows="2" required></textarea>
        </label>
        <label>
          Ətraflı mətn
          <textarea id="content" rows="6" required></textarea>
        </label>
        <button type="submit" class="primary-btn">Yadda saxla</button>
      </form>

      <h4>Mövcud xəbərlər</h4>
      <div id="adminNewsList" class="admin-news-list"></div>
    </main>

    <script src="store.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
